server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # System logs
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          __path__: /var/log/syslog

  # Docker container logs
  - job_name: containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: containerlogs
          __path__: /var/lib/docker/containers/*/*log
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            attrs:
      - json:
          expressions:
            tag:
          source: attrs
      - regex:
          expression: (?P<container_name>(?:[^|]*))\|
          source: tag
      - timestamp:
          format: RFC3339Nano
          source: time
      - labels:
          stream:
          container_name:
      - output:
          source: output

  # Databricks cluster logs
  - job_name: databricks-clusters
    static_configs:
      - targets:
          - localhost
        labels:
          job: databricks-clusters
          __path__: /var/log/databricks-clusters/*.log
    pipeline_stages:
      - regex:
          expression: '(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}) (?P<level>\w+) (?P<cluster_id>\w+-\w+-\w+-\w+-\w+) (?P<message>.*)'
      - timestamp:
          format: '2006-01-02 15:04:05'
          source: timestamp
      - labels:
          level:
          cluster_id:
      - output:
          source: message

  # Databricks job logs
  - job_name: databricks-jobs
    static_configs:
      - targets:
          - localhost
        labels:
          job: databricks-jobs
          __path__: /var/log/databricks-jobs/*.log
    pipeline_stages:
      - regex:
          expression: '(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}) (?P<level>\w+) (?P<job_id>\d+) (?P<run_id>\d+) (?P<message>.*)'
      - timestamp:
          format: '2006-01-02 15:04:05'
          source: timestamp
      - labels:
          level:
          job_id:
          run_id:
      - output:
          source: message

  # Databricks notebook logs
  - job_name: databricks-notebooks
    static_configs:
      - targets:
          - localhost
        labels:
          job: databricks-notebooks
          __path__: /var/log/databricks-notebooks/*.log
    pipeline_stages:
      - regex:
          expression: '(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}) (?P<level>\w+) (?P<notebook_name>[^ ]+) (?P<message>.*)'
      - timestamp:
          format: '2006-01-02 15:04:05'
          source: timestamp
      - labels:
          level:
          notebook_name:
      - output:
          source: message

  # Databricks SQL logs
  - job_name: databricks-sql
    static_configs:
      - targets:
          - localhost
        labels:
          job: databricks-sql
          __path__: /var/log/databricks-sql/*.log
    pipeline_stages:
      - regex:
          expression: '(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}) (?P<level>\w+) (?P<warehouse_id>\w+-\w+-\w+-\w+-\w+) (?P<query_id>\w+) (?P<message>.*)'
      - timestamp:
          format: '2006-01-02 15:04:05'
          source: timestamp
      - labels:
          level:
          warehouse_id:
          query_id:
      - output:
          source: message

  # Databricks streaming logs
  - job_name: databricks-streaming
    static_configs:
      - targets:
          - localhost
        labels:
          job: databricks-streaming
          __path__: /var/log/databricks-streaming/*.log
    pipeline_stages:
      - regex:
          expression: '(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}) (?P<level>\w+) (?P<pipeline_name>[^ ]+) (?P<message>.*)'
      - timestamp:
          format: '2006-01-02 15:04:05'
          source: timestamp
      - labels:
          level:
          pipeline_name:
      - output:
          source: message

  # Spark application logs
  - job_name: spark-applications
    static_configs:
      - targets:
          - localhost
        labels:
          job: spark-applications
          __path__: /var/log/spark-applications/*.log
    pipeline_stages:
      - regex:
          expression: '(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}) (?P<level>\w+) (?P<application_id>application_\d+_\d+) (?P<message>.*)'
      - timestamp:
          format: '2006-01-02 15:04:05'
          source: timestamp
      - labels:
          level:
          application_id:
      - output:
          source: message

  # Application logs from telemetry generator
  - job_name: telemetry-generator
    static_configs:
      - targets:
          - localhost
        labels:
          job: telemetry-generator
          __path__: /var/log/telemetry-generator/*.log
    pipeline_stages:
      - json:
          expressions:
            timestamp:
            level:
            component:
            workspace:
            cluster_id:
            job_id:
            message:
      - timestamp:
          format: RFC3339Nano
          source: timestamp
      - labels:
          level:
          component:
          workspace:
          cluster_id:
          job_id:
      - output:
          source: message
