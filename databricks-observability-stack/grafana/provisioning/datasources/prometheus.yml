apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"
      queryTimeout: "60s"
      httpMethod: "POST"
    secureJsonData: {}

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true
    jsonData:
      maxLines: 1000
    secureJsonData: {}

  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    editable: true
    jsonData:
      tracesToLogs:
        datasourceUid: 'loki'
        tags: ['job', 'instance', 'pod', 'namespace']
        mapTagNamesEnabled: true
        spanStartTimeShift: '1h'
        spanEndTimeShift: '1h'
        filterByTraceID: false
        filterBySpanID: false
      tracesToMetrics:
        datasourceUid: 'prometheus'
        tags: ['service.name', 'job']
        queries:
          - name: 'Sample Query'
            query: 'sum(rate(traces_spanmetrics_latency_bucket{$$__tags}[5m]))'
      serviceMap:
        datasourceUid: 'prometheus'
      search:
        hide: false
        tags: ['tag', 'component', 'job', 'service.name']
      nodeGraph:
        enabled: true
      lokiSearch:
        datasourceUid: 'loki'
    secureJsonData: {}

  - name: OpenTelemetry Collector
    type: prometheus
    access: proxy
    url: http://otel-collector:8889
    editable: true
    jsonData:
      timeInterval: "15s"
      queryTimeout: "60s"
    secureJsonData: {}

  - name: Pyroscope
    type: pyroscope
    access: proxy
    url: http://pyroscope:4040
    editable: true
    jsonData: {}
    secureJsonData: {}
