global:
  smtp_smarthost: 'localhost:587'
  smtp_from: 'alertmanager@databricks-observability.local'
  smtp_require_tls: false

route:
  group_by: ['alertname', 'cluster', 'service', 'environment']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'web.hook'
  routes:
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 5s
      repeat_interval: 5m
    - match:
        severity: warning
      receiver: 'warning-alerts'
      group_wait: 30s
      repeat_interval: 2h
    - match:
        severity: info
      receiver: 'info-alerts'
      group_wait: 60s
      repeat_interval: 24h

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'cluster', 'service']

receivers:
  - name: 'web.hook'
    webhook_configs:
      - url: 'http://localhost:5001/'
        send_resolved: true
        http_config:
          bearer_token: 'your-webhook-token'

  - name: 'critical-alerts'
    slack_configs:
      - api_url: 'YOUR_SLACK_WEBHOOK_URL'
        channel: '#databricks-critical'
        title: '🚨 Critical Databricks Alert'
        text: |
          *Alert:* {{ .CommonAnnotations.summary }}
          *Description:* {{ .CommonAnnotations.description }}
          *Severity:* {{ .CommonLabels.severity }}
          *Cluster:* {{ .CommonLabels.cluster }}
          *Environment:* {{ .CommonLabels.environment }}
          *Runbook:* {{ .CommonAnnotations.runbook_url }}
        send_resolved: true
        icon_emoji: ':rotating_light:'
        color: 'danger'
    email_configs:
      - to: 'sre-team@company.com'
        subject: '🚨 Critical Databricks Alert: {{ .CommonLabels.alertname }}'
        body: |
          Alert: {{ .CommonAnnotations.summary }}
          Description: {{ .CommonAnnotations.description }}
          Severity: {{ .CommonLabels.severity }}
          Cluster: {{ .CommonLabels.cluster }}
          Environment: {{ .CommonLabels.environment }}
          Runbook: {{ .CommonAnnotations.runbook_url }}
          
          View in Grafana: {{ .CommonAnnotations.grafana_dashboard_url }}
    webhook_configs:
      - url: 'http://localhost:5001/critical'
        send_resolved: true

  - name: 'warning-alerts'
    slack_configs:
      - api_url: 'YOUR_SLACK_WEBHOOK_URL'
        channel: '#databricks-warnings'
        title: '⚠️ Databricks Warning'
        text: |
          *Alert:* {{ .CommonAnnotations.summary }}
          *Description:* {{ .CommonAnnotations.description }}
          *Severity:* {{ .CommonLabels.severity }}
          *Cluster:* {{ .CommonLabels.cluster }}
        send_resolved: true
        icon_emoji: ':warning:'
        color: 'warning'
    email_configs:
      - to: 'databricks-team@company.com'
        subject: '⚠️ Databricks Warning: {{ .CommonLabels.alertname }}'
        body: |
          Alert: {{ .CommonAnnotations.summary }}
          Description: {{ .CommonAnnotations.description }}
          Severity: {{ .CommonLabels.severity }}
          Cluster: {{ .CommonLabels.cluster }}

  - name: 'info-alerts'
    slack_configs:
      - api_url: 'YOUR_SLACK_WEBHOOK_URL'
        channel: '#databricks-info'
        title: 'ℹ️ Databricks Info'
        text: |
          *Alert:* {{ .CommonAnnotations.summary }}
          *Description:* {{ .CommonAnnotations.description }}
          *Severity:* {{ .CommonLabels.severity }}
        send_resolved: true
        icon_emoji: ':information_source:'
        color: 'good'

templates:
  - '/etc/alertmanager/templates/*.tmpl'
