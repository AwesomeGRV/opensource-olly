receiver:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  prometheus:
    config:
      scrape_configs:
        - job_name: 'otel-collector'
          static_configs:
            - targets: ['localhost:8888']
          scrape_interval: 10s
  jaeger:
    protocols:
      grpc:
        endpoint: 0.0.0.0:14250
      thrift_http:
        endpoint: 0.0.0.0:14268
  zipkin:
    endpoint: 0.0.0.0:9411

processor:
  batch:
    send_batch_max_size: 1000
    send_batch_size: 100
    timeout: 10s
  memory_limiter:
    limit_mib: 512
    spike_limit_mib: 128
    check_interval: 5s
  resource:
    attributes:
      - key: environment
        value: production
        action: upsert
      - key: service.name
        value: databricks-observability
        action: upsert
  attributes:
    actions:
      - key: cluster_id
        action: extract
        from_attribute: databricks.cluster_id
      - key: job_id
        action: extract
        from_attribute: databricks.job_id
      - key: notebook_name
        action: extract
        from_attribute: databricks.notebook_name
      - key: pipeline_name
        action: extract
        from_attribute: databricks.pipeline_name
      - key: warehouse_id
        action: extract
        from_attribute: databricks.warehouse_id
      - key: workspace
        action: extract
        from_attribute: databricks.workspace
      - key: team
        action: extract
        from_attribute: databricks.team
      - key: severity
        action: extract
        from_attribute: databricks.severity

exporter:
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: "otel"
    const_labels:
      environment: "production"
  loki:
    endpoint: "http://loki:3100/loki/api/v1/push"
    labels:
      job: "otel-collector"
      service: "databricks-observability"
  otlp:
    endpoint: "http://tempo:4317"
    tls:
      insecure: true
  otlphttp:
    endpoint: "http://tempo:4318"
  logging:
    loglevel: info

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, pprof, zpages]
  pipelines:
    traces:
      receivers: [otlp, jaeger, zipkin]
      processors: [memory_limiter, batch, resource, attributes]
      exporters: [otlp, otlphttp, logging]
    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, batch, resource, attributes]
      exporters: [prometheus, logging]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource, attributes]
      exporters: [loki, logging]
